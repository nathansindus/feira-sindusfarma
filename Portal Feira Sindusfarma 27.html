  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"7e3992ad-47b8-464e-a2cd-10adf35f0790\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8b9d5827-ffbf-45cc-9ca9-266e5121cdb2\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"15325ce6-95dc-4f5e-b2da-a4e30b44c883\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n*{box-sizing:border-box;margin:0;padding:0;}\nhtml{scroll-behavior:smooth;}\nbody{font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1b3e;color:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;letter-spacing:-0.011em;}\n\n/* Display / headings → Space Grotesk */\nh1,h2,h3,.cd-num,.ind-num,.section-label,.nav-logo-text{font-family:'Space Grotesk','Manrope',sans-serif;}\n.font-display{font-family:'Space Grotesk','Manrope',sans-serif;}\n.tabular{font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1;}\n\n/* ══ NAV ══ */\n.nav{position:fixed;top:0;left:0;right:0;z-index:900;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;background:rgba(10,20,40,0.88);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,0.07);}\n.nav-logo{display:flex;align-items:center;gap:10px;}\n.nav-logo-text{font-size:15px;font-weight:700;color:#fff;line-height:1.2;}\n.nav-logo-text span{color:#00e5c0;}\n.nav-links{display:flex;align-items:center;gap:32px;}\n.nav-links a{font-size:13px;color:#7eb8d4;text-decoration:none;font-weight:600;letter-spacing:0.03em;transition:color 0.15s;}\n.nav-links a{position:relative;}\n.nav-links a::after{content:'';position:absolute;left:0;right:100%;bottom:-6px;height:1.5px;background:#00e5c0;transition:right 0.28s cubic-bezier(0.22,1,0.36,1);}\n.nav-links a:hover{color:#00e5c0;}\n.nav-links a.active{color:#00e5c0;}\n.nav-links a.active::after{right:0;}\n.nav-links a:hover::after{right:0;}\n.nav-cta{background:rgba(255,255,255,0.04);border:1.5px solid rgba(0,229,192,0.55);color:#cdeee7;padding:8px 18px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Manrope',-apple-system,sans-serif;letter-spacing:0.04em;text-decoration:none;transition:background 0.18s,color 0.18s,border-color 0.18s,box-shadow 0.18s;}\n.nav-cta:hover,.nav-cta:focus,.nav-cta:active{background:#00e5c0;border-color:#00e5c0;color:#0d1b3e;box-shadow:0 4px 18px rgba(0,229,192,0.35);}\n.nav-cta.primary{background:rgba(255,255,255,0.04);color:#cdeee7;}\n.nav-cta.primary:hover,.nav-cta.primary:focus,.nav-cta.primary:active{background:#00e5c0;border-color:#00e5c0;color:#0d1b3e;}\n.nav-actions{display:flex;align-items:center;gap:12px;}\n@media(max-width:960px){.nav-links{display:none;}}\n@media(max-width:620px){.nav-cta{padding:7px 12px;font-size:11px;}.nav-actions{gap:8px;}}\n\n/* ══ COUNTDOWN ══ */\n.countdown-wrap{padding:84px 24px 44px;text-align:center;background:linear-gradient(180deg,#0a1428 0%,#0d1b3e 100%);border-bottom:1px solid #1e3a5f;position:relative;transition:padding 0.4s ease,max-height 0.5s ease;max-height:320px;overflow:hidden;}\n.countdown-wrap::before{content:'';position:absolute;top:-40%;left:50%;transform:translateX(-50%);width:680px;height:420px;background:radial-gradient(ellipse at center,rgba(0,229,192,0.14) 0%,rgba(0,229,192,0) 68%);pointer-events:none;}\n.countdown-wrap.collapsed{padding-top:72px;padding-bottom:16px;max-height:110px;}\n.countdown-wrap.collapsed .countdown-eyebrow,\n.countdown-wrap.collapsed .countdown-title,\n.countdown-wrap.collapsed .countdown-sub,\n.countdown-wrap.collapsed .countdown-blocks{opacity:0;pointer-events:none;transition:opacity 0.2s;}\n.countdown-eyebrow,.countdown-title,.countdown-sub,.countdown-blocks{transition:opacity 0.3s;}\n.cd-toggle{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.05);border:1px solid #1e3a5f;color:#7eb8d4;border-radius:99px;padding:4px 16px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Manrope',-apple-system,sans-serif;letter-spacing:0.06em;transition:border-color 0.15s,color 0.15s,background 0.15s;white-space:nowrap;}\n.cd-toggle:hover{border-color:#00e5c0;color:#00e5c0;background:rgba(0,229,192,0.07);}\n.countdown-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.24em;color:#7eb8d4;text-transform:uppercase;margin-bottom:8px;position:relative;}\n.countdown-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:5px;letter-spacing:-0.02em;position:relative;}\n.countdown-sub{font-size:14px;color:#7eb8d4;margin-bottom:22px;letter-spacing:0.02em;position:relative;}\n.countdown-blocks{display:flex;justify-content:center;align-items:center;gap:6px;flex-wrap:wrap;position:relative;}\n.cd-block{background:#0a1428;border:1px solid #1e3a5f;border-radius:12px;padding:12px 20px;min-width:84px;text-align:center;transition:border-color 0.3s,box-shadow 0.3s;}\n.cd-num{font-size:42px;font-weight:700;line-height:1;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;}\n.cd-lbl{font-size:10px;font-weight:600;color:#7eb8d4;text-transform:uppercase;letter-spacing:0.12em;margin-top:4px;}\n.cd-sep{font-size:28px;font-weight:700;color:#1e3a5f;padding:0 2px;align-self:center;margin-bottom:12px;}\n\n/* ══ HERO ══ */\n.hero{position:relative;min-height:90vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0a1428;padding:120px 32px 80px;}\n.hero-bg{position:absolute;inset:0;z-index:0;background-image:radial-gradient(rgba(0,229,192,0.07) 1px,transparent 1px);background-size:42px 42px;animation:gridDrift 26s linear infinite;}\n.hero-glow1{position:absolute;top:-15%;left:8%;width:620px;height:620px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,192,0.16) 0%,rgba(0,229,192,0) 70%);z-index:0;animation:glowDrift 18s ease-in-out infinite;}\n.hero-glow2{position:absolute;bottom:-20%;right:5%;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(77,166,255,0.13) 0%,rgba(77,166,255,0) 70%);z-index:0;animation:glowDrift 22s ease-in-out infinite reverse;}\n.hero-vignette{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(10,20,40,0.2) 0%,rgba(10,20,40,0) 30%,rgba(13,27,62,0.55) 100%);pointer-events:none;}\n.hero-inner{position:relative;z-index:2;max-width:920px;text-align:center;}\n.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:12px;font-weight:700;letter-spacing:0.26em;color:#00e5c0;text-transform:uppercase;margin-bottom:26px;padding:8px 18px;border:1px solid rgba(0,229,192,0.3);border-radius:99px;background:rgba(0,229,192,0.05);}\n.hero-eyebrow::before{content:'';width:7px;height:7px;border-radius:50%;background:#00e5c0;box-shadow:0 0 10px #00e5c0;animation:pulseDot 2s ease-in-out infinite;}\n.hero-title{font-family:'Space Grotesk','Manrope',sans-serif;font-size:clamp(44px,7vw,86px);font-weight:700;line-height:1.02;letter-spacing:-0.04em;color:#fff;margin-bottom:24px;}\n.hero-title span{color:#00e5c0;}\n.hero-anchor{font-size:clamp(16px,2vw,20px);line-height:1.6;color:#c0d8f0;max-width:680px;margin:0 auto 34px;}\n.hero-meta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:44px;}\n.hero-pill{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#c0d8f0;padding:9px 18px;border:1px solid #1e3a5f;border-radius:99px;background:rgba(10,20,40,0.5);backdrop-filter:blur(4px);}\n.hero-pill svg{flex-shrink:0;}\n.hero-scroll{display:inline-flex;flex-direction:column;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#7eb8d4;}\n.hero-scroll .chev{font-size:18px;color:#00e5c0;animation:scrollBob 1.8s ease-in-out infinite;}\n\n/* ══ COUNTDOWN BAND ══ */\n.countdown-band{position:relative;padding:40px 24px;text-align:center;background:#0d1b3e;border-top:1px solid #1e3a5f;border-bottom:1px solid #1e3a5f;}\n.cd-band-label{font-size:11px;font-weight:700;letter-spacing:0.24em;color:#7eb8d4;text-transform:uppercase;margin-bottom:18px;}\n\n@keyframes gridDrift{from{background-position:0 0;}to{background-position:42px 42px;}}\n@keyframes glowDrift{0%,100%{transform:translate(0,0);}50%{transform:translate(40px,30px);}}\n@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.8);}}\n@keyframes scrollBob{0%,100%{transform:translateY(0);}50%{transform:translateY(6px);}}\n\n/* ══ INDICATORS FULLSCREEN ══ */\n.indicators-wrap{position:relative;overflow:hidden;height:480px;background:#000;}\n\n/* track slides horizontally */\n.indicators-track{display:flex;height:100%;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);}\n\n.ind-card{\n  flex:0 0 100%;\n  height:100%;\n  position:relative;\n  overflow:hidden;\n  display:flex;\n  align-items:flex-end;\n}\n\n/* photo background */\n.ind-bg{\n  position:absolute;inset:0;\n  background-size:cover;\n  background-position:center;\n  transition:transform 0.6s ease;\n}\n.ind-card:hover .ind-bg{transform:scale(1.03);}\n\n/* dark gradient overlay */\n.ind-overlay{\n  position:absolute;inset:0;\n  background:linear-gradient(to right, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.15) 100%);\n}\n\n/* content over photo */\n.ind-content{\n  position:relative;z-index:2;\n  padding:56px 72px;\n  max-width:600px;\n}\n.ind-num{\n  font-size:108px;font-weight:700;line-height:1;\n  letter-spacing:-0.05em;\n  font-variant-numeric:tabular-nums;\n  color:#ffffff;\n  text-shadow:0 0 40px rgba(255,255,255,0.2);\n}\n.ind-num.blue  {color:#ffffff; text-shadow:0 0 40px rgba(255,255,255,0.2);}\n.ind-num.amber {color:#ffffff; text-shadow:0 0 40px rgba(255,255,255,0.2);}\n.ind-num.purple{color:#ffffff; text-shadow:0 0 40px rgba(255,255,255,0.2);}\n.ind-num.pink  {color:#ffffff; text-shadow:0 0 40px rgba(255,255,255,0.2);}\n.ind-title{font-size:22px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:0.12em;margin-top:14px;margin-bottom:10px;}\n.ind-desc{font-size:14.5px;color:rgba(255,255,255,0.72);line-height:1.65;max-width:440px;}\n\n/* nav arrows */\n.ind-arrow-btn{\n  position:absolute;top:50%;transform:translateY(-50%);\n  z-index:10;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);\n  color:#fff;width:44px;height:44px;border-radius:50%;cursor:pointer;\n  display:flex;align-items:center;justify-content:center;font-size:18px;\n  transition:background 0.2s;backdrop-filter:blur(4px);\n}\n.ind-arrow-btn:hover{background:rgba(0,229,192,0.2);border-color:#00e5c0;}\n.ind-prev{left:20px;}\n.ind-next{right:20px;}\n\n/* dots */\n.ind-dots{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;}\n.ind-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.35);border:none;cursor:pointer;transition:background 0.2s,transform 0.2s;}\n.ind-dot.active{background:#00e5c0;transform:scale(1.3);}\n\n/* card counter */\n.ind-counter{position:absolute;top:24px;right:28px;z-index:10;font-size:12px;font-weight:600;color:rgba(255,255,255,0.5);letter-spacing:0.08em;}\n\n/* ══ SOBRE A FEIRA ══ */\n.sobre-wrap{padding:104px 48px;background:#0a1428;border-top:1px solid #1e3a5f;}\n.sobre-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center;}\n.sobre-text .eyebrow{font-size:13px;font-weight:700;letter-spacing:0.2em;color:#00e5c0;text-transform:uppercase;margin-bottom:14px;}\n.sobre-text h2{font-size:44px;font-weight:700;color:#fff;line-height:1.15;margin-bottom:22px;letter-spacing:-0.025em;}\n.sobre-text h2 span{color:#00e5c0;}\n.sobre-text p{font-size:14px;color:#c0d8f0;line-height:1.8;margin-bottom:16px;}\n.sobre-text .tag-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(0,229,192,0.1);border:1px solid rgba(0,229,192,0.3);color:#00e5c0;font-size:11px;font-weight:700;padding:5px 12px;border-radius:99px;margin:4px 4px 4px 0;}\n.sobre-visual{display:flex;flex-direction:column;gap:16px;}\n.pilar-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}\n.pilar-card{background:#0d1b3e;border:1px solid #1e3a5f;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:10px;transition:border-color 0.2s;}\n.pilar-card:hover{border-color:#00e5c0;transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,229,192,0.12);}\n.pilar-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}\n.pilar-name{font-size:12px;font-weight:700;color:#fff;}\n.sobre-quote{background:#0d1b3e;border:1px solid #1e3a5f;border-left:3px solid #00e5c0;border-radius:10px;padding:16px 20px;font-size:13px;color:#c0d8f0;line-height:1.7;font-style:italic;}\n\n/* ══ PAGE BODY ══ */\n.page-body{padding:48px 48px 0;}\n.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;}\n.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#7eb8d4;}\n.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}\n.section-label{font-size:25px;font-weight:700;color:#00e5c0;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:20px;margin-top:0;display:flex;align-items:center;gap:12px;}\n.section-label::after{content:'';width:60px;height:1px;background:#1e3a5f;flex:0 0 60px;}\n.section-label::before{content:'';width:4px;height:18px;background:#00e5c0;border-radius:2px;flex-shrink:0;}\n\n/* PHASES */\n.phases-strip{display:flex;align-items:stretch;gap:0;position:relative;}\n.phase-col{flex:1;display:flex;flex-direction:column;}\n.phase-head{display:flex;align-items:center;position:relative;height:52px;}\n.phase-head::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#1e3a5f;z-index:0;}\n.phase-col:first-child .phase-head::before{left:50%;}\n.phase-col:last-child .phase-head::before{right:50%;}\n.phase-circle{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:1px solid;position:relative;z-index:1;margin:0 auto;flex-shrink:0;}\n.phase-col[data-col=\"edu\"]  .phase-circle{background:#0a1428;border-color:#2563b0;color:#7eb8d4;}\n.phase-col[data-col=\"pesq\"] .phase-circle{background:#0a1428;border-color:#00e5c0;color:#00e5c0;}\n.phase-col[data-col=\"both\"] .phase-circle{background:#0a1428;border-color:#ffc060;color:#ffc060;}\n.phase-label{text-align:center;padding:8px 6px 2px;font-size:11px;font-weight:700;color:#fff;line-height:1.35;min-height:36px;}\n.phase-sublabel{text-align:center;font-size:10px;color:#7eb8d4;padding:0 4px 8px;line-height:1.3;}\n.phase-tag{display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;margin:0 auto 10px;}\n.tag-edu {background:#0f2040;color:#7eb8d4;border:1px solid #1e3a5f;}\n.tag-pesq{background:#0f3a2e;color:#00e5c0;border:1px solid #0d4c38;}\n.tag-both{background:#2a1f0a;color:#ffc060;border:1px solid #3a2f1a;}\n.tasks-area{padding:0 5px;flex:1;}\n.task-card{background:#0a1428;border:1px solid #1e3a5f;border-radius:8px;padding:10px 12px;margin-bottom:7px;font-size:11px;line-height:1.45;color:#c0d8f0;transition:background 0.2s,border-color 0.2s,transform 0.2s,box-shadow 0.2s;}\n.task-card:hover{background:#0f2040;border-color:#2563b0;transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,0.3);}\n.task-card.done{opacity:0.55;}\n.task-card .task-title{font-weight:600;color:#fff;margin-bottom:5px;font-size:12px;}\n.task-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:4px;}\n.task-date{font-size:10px;color:#7eb8d4;}\n.task-date.ok{color:#00e5c0;}\n.badge-conjunto{font-size:10px;font-weight:600;background:#2a1f0a;color:#ffc060;padding:1px 7px;border-radius:99px;border:1px solid #3a2f1a;}\n.badge-ai{font-size:10px;font-weight:600;background:#1a1a4a;color:#a0a0ff;padding:1px 7px;border-radius:99px;border:1px solid #2a2a6a;}\n.avatar-circle{width:16px;height:16px;border-radius:50%;background:#1e3a5f;color:#7eb8d4;font-size:8px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;}\n.divider{height:1px;background:#1e3a5f;margin:40px 0;}\n\n/* AGENTS */\n.context-grid{position:relative;width:100%;max-width:780px;margin:0 auto;aspect-ratio:1/1;max-height:580px;}\n.dl-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:180px;background:#0a1428;border:2px solid #00e5c0;border-radius:16px;padding:16px 14px;text-align:center;z-index:10;cursor:pointer;transition:border-color 0.2s,transform 0.2s;}\n.dl-center:hover{border-color:#5fffd8;transform:translate(-50%,-50%) scale(1.04);}\n.dl-center-icon{margin:0 auto 8px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;}\n.dl-center h3{font-size:12px;font-weight:700;color:#00e5c0;line-height:1.3;margin-bottom:4px;}\n.dl-center p{font-size:10px;color:#7eb8d4;line-height:1.4;}\n.dl-open-btn{display:inline-block;margin-top:8px;font-size:10px;font-weight:700;color:#0d1b3e;background:#00e5c0;padding:4px 10px;border-radius:99px;text-decoration:none;transition:background 0.15s;}\n.dl-open-btn:hover{background:#5fffd8;}\n.agent-card{position:absolute;width:148px;background:#0a1428;border:1px solid;border-radius:14px;padding:14px 12px 12px;text-align:center;cursor:pointer;transition:transform 0.18s,border-color 0.18s;z-index:10;}\n.agent-card:hover{transform:scale(1.05);}\n.agent-card.ac{top:2%;left:2%;border-color:#00e5c0;}\n.agent-card.ef{top:2%;right:2%;border-color:#4da6ff;}\n.agent-card.fi{bottom:2%;left:2%;border-color:#a78bfa;}\n.agent-card.sp{bottom:2%;right:2%;border-color:#fbbf24;}\n.agent-card .ac-icon{width:52px;height:52px;border-radius:12px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;}\n.ac .ac-icon{background:#0d2e1f;}.ef .ac-icon{background:#0d1e35;}.fi .ac-icon{background:#1a1030;}.sp .ac-icon{background:#2a1a06;}\n.agent-card .ac-step{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:700;margin-bottom:6px;}\n.ac .ac-step{background:#00e5c0;color:#0d1b3e;}.ef .ac-step{background:#4da6ff;color:#0d1b3e;}.fi .ac-step{background:#a78bfa;color:#0d1b3e;}.sp .ac-step{background:#fbbf24;color:#0d1b3e;}\n.agent-card .ac-name{font-size:11px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:4px;}\n.agent-card .ac-desc{font-size:9.5px;color:#7eb8d4;line-height:1.4;}\n.agent-card .ac-hint{font-size:9px;color:#00e5c0;margin-top:5px;opacity:0.75;}\n.connectors{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:5;}\n\n/* MODAL */\n.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1000;align-items:center;justify-content:center;padding:24px;}\n.modal-overlay.open{display:flex;}\n.modal-box{background:#0a1428;border:1px solid #1e3a5f;border-radius:14px;max-width:92vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;}\n.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #1e3a5f;gap:12px;}\n.modal-header h3{font-size:14px;font-weight:700;color:#00e5c0;}\n.modal-close{background:none;border:1px solid #1e3a5f;color:#7eb8d4;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}\n.modal-close:hover{background:#0f2040;color:#fff;}\n.modal-body{overflow:auto;padding:16px;}\n.modal-body img{display:block;max-width:100%;height:auto;border-radius:8px;}\n\n/* FOOTER */\n.page-footer{padding:32px 48px;border-top:1px solid #1e3a5f;margin-top:48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}\n.gantt-row{transition:background 0.15s;}\n.gantt-row:hover{background:rgba(255,255,255,0.03);}\n.footer-text{font-size:11px;color:#7eb8d4;line-height:1.6;}\n.footer-text strong{color:#00e5c0;}\n\n/* ══ ANIMATIONS ══════════════════════════════════════ */\n\n/* 1. Scroll reveal */\n.reveal{opacity:0;transform:translateY(32px);transition:opacity 0.85s cubic-bezier(0.22,1,0.36,1),transform 0.85s cubic-bezier(0.22,1,0.36,1);}\n.reveal.visible{opacity:1;transform:translateY(0);}\n.reveal-left{opacity:0;transform:translateX(-40px);transition:opacity 0.85s cubic-bezier(0.22,1,0.36,1),transform 0.85s cubic-bezier(0.22,1,0.36,1);}\n.reveal-left.visible{opacity:1;transform:translateX(0);}\n.reveal-right{opacity:0;transform:translateX(40px);transition:opacity 0.85s cubic-bezier(0.22,1,0.36,1),transform 0.85s cubic-bezier(0.22,1,0.36,1);}\n.reveal-right.visible{opacity:1;transform:translateX(0);}\n.reveal-d1{transition-delay:0.1s;}\n.reveal-d2{transition-delay:0.2s;}\n.reveal-d3{transition-delay:0.3s;}\n.reveal-d4{transition-delay:0.4s;}\n.reveal-d5{transition-delay:0.5s;}\n.reveal-d6{transition-delay:0.6s;}\n\n/* 2. Flip countdown */\n.cd-block{perspective:300px;position:relative;}\n.cd-flip{display:inline-block;transition:transform 0.25s ease;transform-style:preserve-3d;will-change:transform;}\n.cd-flip.flipping{animation:flipDown 0.3s ease;}\n@keyframes flipDown{\n  0%{transform:rotateX(0deg);}\n  50%{transform:rotateX(-90deg);}\n  100%{transform:rotateX(0deg);}\n}\n\n/* 3. Progress bar animate */\n.prog-bar-fill{width:0;transition:none;height:100%;background:linear-gradient(90deg,#00e5c0,#4da6ff);border-radius:99px;}\n\n/* 4. Pilar cards cascade */\n.pilar-card{opacity:0;transform:translateY(20px);transition:opacity 0.5s ease,transform 0.5s ease,border-color 0.2s;}\n.pilar-card.visible{opacity:1;transform:translateY(0);}\n\n/* 5. Data lake pulse fill */\n@keyframes dlFill{\n  0%{stroke-dashoffset:200;}\n  100%{stroke-dashoffset:0;}\n}\n.dl-path-anim{stroke-dasharray:200;stroke-dashoffset:200;animation:dlFill 1.2s ease forwards;}\n.dl-path-anim-2{stroke-dasharray:200;stroke-dashoffset:200;animation:dlFill 1.2s 0.4s ease forwards;}\n.dl-path-anim-3{stroke-dasharray:200;stroke-dashoffset:200;animation:dlFill 1.2s 0.8s ease forwards;}\n\n/* ── Curadoria: Data Lake → Agentes ── */\n.lake-panel{display:flex;align-items:center;gap:28px;}\n.lake-chips{display:flex;gap:8px;flex-wrap:wrap;}\n.agents-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;align-items:start;}\n.flow-strip{position:relative;height:152px;}\n.flow-mobile-arrow{display:none;}\n.lake-shimmer{animation:lakeShimmer 6s ease-in-out infinite;}\n@keyframes lakeShimmer{0%{transform:translateX(-160px);opacity:0;}12%{opacity:1;}55%,100%{transform:translateX(1300px);opacity:0;}}\n.lake-level{animation:lakeLevel 3.2s ease-in-out infinite;}\n@keyframes lakeLevel{0%,100%{opacity:0.3;}50%{opacity:0.85;}}\n.port-pulse{animation:portPulse 2.4s ease-in-out infinite;}\n@keyframes portPulse{0%,100%{opacity:1;box-shadow:0 0 12px #00e5c0;}50%{opacity:0.65;box-shadow:0 0 22px #00e5c0;}}\n@media(max-width:760px){\n  .lake-panel{flex-direction:column;text-align:center;}\n  .lake-panel .lake-chips{justify-content:center;}\n  .agents-grid{grid-template-columns:repeat(2,1fr);}\n  .flow-strip{display:none;}\n  .flow-mobile-arrow{display:flex;}\n}\n\n/* 6. Number counter */\n.count-up{display:inline-block;}\n\n/* 7. Section entrance */\n.section-fade{opacity:0;transition:opacity 0.8s ease;}\n.section-fade.visible{opacity:1;}\n\n\n\n@media(max-width:900px){\n  .nav-links{display:none;}\n  .sobre-inner{grid-template-columns:1fr;}\n  .page-body{padding:32px 20px 0;}\n  .sobre-wrap{padding:48px 20px;}\n  .countdown-wrap{padding:80px 16px 40px;}\n  .indicators-wrap{height:380px;}\n  .ind-content{padding:32px 28px;}\n  .ind-num{font-size:64px;}\n}\n@media(max-width:700px){\n  .phases-strip{flex-direction:column;gap:16px;}\n  .phase-head::before{display:none;}\n  .context-grid{aspect-ratio:auto;height:auto;display:flex;flex-direction:column;align-items:center;gap:12px;max-height:none;}\n  .agent-card,.dl-center{position:static;transform:none;width:90%;max-width:280px;}\n  .connectors{display:none;}\n  .indicators-wrap{height:320px;}\n  .ind-num{font-size:52px;}\n  .ind-title{font-size:15px;}\n  .ind-desc{font-size:12px;}\n}\n\n/* ══ OVERLAY: SEJA PATROCINADOR ══ */\n#sponsorOverlay{position:fixed;inset:0;z-index:2000;display:none;overflow-y:auto;background:#0d1b3e;}\n#sponsorOverlay.open{display:block;animation:spFade 0.28s ease;}\n@keyframes spFade{from{opacity:0;}to{opacity:1;}}\nbody.sp-lock{overflow:hidden;}\n#sponsorOverlay .stage{position:relative;min-height:100vh;overflow:hidden;\n  background:\n    radial-gradient(1200px 700px at 12% 8%, rgba(0,229,192,0.12), transparent 60%),\n    radial-gradient(900px 600px at 88% 92%, rgba(77,166,255,0.14), transparent 60%),\n    linear-gradient(135deg,#081227 0%,#0d1b3e 45%,#0a1730 100%);}\n#sponsorOverlay .grid-overlay{position:absolute;inset:0;pointer-events:none;\n  background-image:linear-gradient(rgba(255,255,255,0.028) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.028) 1px,transparent 1px);\n  background-size:56px 56px;-webkit-mask-image:radial-gradient(circle at 50% 40%,#000 40%,transparent 90%);mask-image:radial-gradient(circle at 50% 40%,#000 40%,transparent 90%);}\n#sponsorOverlay .orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:0.5;pointer-events:none;animation:spFloat 14s ease-in-out infinite;}\n#sponsorOverlay .orb.a{width:420px;height:420px;background:#00e5c0;top:-120px;left:-80px;}\n#sponsorOverlay .orb.b{width:520px;height:520px;background:#4da6ff;bottom:-180px;right:-120px;animation-delay:-6s;}\n@keyframes spFloat{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-24px);}}\n#sponsorOverlay .topbar{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:22px 48px;}\n#sponsorOverlay .back{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#9fc4dd;text-decoration:none;letter-spacing:0.02em;cursor:pointer;background:none;border:none;font-family:'Manrope',sans-serif;transition:color 0.15s;}\n#sponsorOverlay .back:hover{color:#00e5c0;}\n#sponsorOverlay .wrap{position:relative;z-index:5;max-width:1240px;margin:0 auto;padding:12px 48px 72px;display:grid;grid-template-columns:1.35fr 400px;gap:56px;align-items:center;}\n#sponsorOverlay .copy{max-width:640px;}\n#sponsorOverlay .eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#00e5c0;margin-bottom:26px;}\n#sponsorOverlay .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:#00e5c0;box-shadow:0 0 10px #00e5c0;}\n#sponsorOverlay .copy h1{font-size:clamp(48px,6.6vw,86px);line-height:1.0;font-weight:700;letter-spacing:-0.035em;margin-bottom:28px;color:#fff;}\n#sponsorOverlay .copy h1 .accent{background:linear-gradient(100deg,#00e5c0,#4da6ff);-webkit-background-clip:text;background-clip:text;color:transparent;}\n#sponsorOverlay .copy .lead{font-size:22px;line-height:1.6;color:#c0d8f0;font-weight:400;max-width:560px;}\n#sponsorOverlay .copy .lead strong{color:#fff;font-weight:700;}\n#sponsorOverlay .meta{display:flex;gap:26px;margin-top:38px;flex-wrap:wrap;}\n#sponsorOverlay .meta .item{d "><\u002Fpath><\u002Fsvg><\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<section class=\"hero\" id=\"inicio\">\n  <div class=\"hero-bg\"><\u002Fdiv>\n  <div class=\"hero-glow1\"><\u002Fdiv>\n  <div class=\"hero-glow2\"><\u002Fdiv>\n  <div class=\"hero-vignette\"><\u002Fdiv>\n  <div class=\"hero-inner\">\n    <div class=\"hero-eyebrow\">Sindusfarma Brasil · Feira de Negócios<\u002Fdiv>\n    <h1 class=\"hero-title\">Feira Sindusfarma<br>Brasil <span>2027<\u002Fspan><\u002Fh1>\n    <p class=\"hero-anchor\">A indústria farmacêutica reunida em dois dias de conteúdo estratégico, negócios e conexões — com uma curadoria baseada na análise estratégica do 1º Censo da Indústria Farmacêutica.<\u002Fp>\n    <div class=\"hero-meta\">\n      <span class=\"hero-pill\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"16\" rx=\"2\" stroke=\"#00e5c0\" stroke-width=\"1.8\"><\u002Frect><path d=\"M3 9h18M8 3v4M16 3v4\" stroke=\"#00e5c0\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg> 19 e 20 de maio de 2027<\u002Fspan>\n      <span class=\"hero-pill\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11Z\" stroke=\"#00e5c0\" stroke-width=\"1.8\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"2.5\" stroke=\"#00e5c0\" stroke-width=\"1.8\"><\u002Fcircle><\u002Fsvg> São Paulo · SP<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"margin-bottom:40px;\">\n      <div class=\"cd-band-label\" style=\"margin-bottom:16px;\">Contagem regressiva para a feira<\u002Fdiv>\n      <div class=\"countdown-blocks\">\n        <div class=\"cd-block\"><div class=\"cd-num\" id=\"cd-dias\" style=\"color:#00e5c0;\"><span class=\"cd-flip\">--<\u002Fspan><\u002Fdiv><div class=\"cd-lbl\">Dias<\u002Fdiv><\u002Fdiv>\n        <div class=\"cd-sep\">:<\u002Fdiv>\n        <div class=\"cd-block\"><div class=\"cd-num\" id=\"cd-horas\" style=\"color:#fff;\"><span class=\"cd-flip\">--<\u002Fspan><\u002Fdiv><div class=\"cd-lbl\">Horas<\u002Fdiv><\u002Fdiv>\n        <div class=\"cd-sep\">:<\u002Fdiv>\n        <div class=\"cd-block\"><div class=\"cd-num\" id=\"cd-min\" style=\"color:#fff;\"><span class=\"cd-flip\">--<\u002Fspan><\u002Fdiv><div class=\"cd-lbl\">Minutos<\u002Fdiv><\u002Fdiv>\n        <div class=\"cd-sep\">:<\u002Fdiv>\n        <div class=\"cd-block\"><div class=\"cd-num\" id=\"cd-seg\" style=\"color:#7eb8d4;\"><span class=\"cd-flip\">--<\u002Fspan><\u002Fdiv><div class=\"cd-lbl\">Segundos<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <a href=\"#sobre\" style=\"text-decoration:none;\"><div class=\"hero-scroll\">Role para explorar<span class=\"chev\">↓<\u002Fspan><\u002Fdiv><\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ POR QUE PARTICIPAR + INDICATORS ══ -->\n<div style=\"text-align:center;padding:80px 32px 36px;background:#0a1428;\">\n  <div style=\"font-size:13px;font-weight:700;letter-spacing:0.2em;color:#00e5c0;text-transform:uppercase;margin-bottom:14px;\">A feira em números<\u002Fdiv>\n  <h2 style=\"font-size:clamp(30px,4vw,44px);font-weight:700;color:#fff;letter-spacing:-0.03em;line-height:1.12;\">Por que participar do <span style=\"color:#00e5c0;\">Sindusfarma Brasil<\u002Fspan>?<\u002Fh2>\n<\u002Fdiv>\n<div class=\"indicators-wrap\">\n  <div class=\"indicators-track\" id=\"indTrack\">\n\n    <!-- Card 1 — Palestrantes -->\n    <div class=\"ind-card\">\n      <div class=\"ind-bg\" style=\"background:url('img_palestrantes.png') center/cover no-repeat, radial-gradient(120% 120% at 20% 20%, #0b3a2e 0%, #0a1428 62%)\"><\u002Fdiv>\n      <div class=\"ind-overlay\"><\u002Fdiv>\n      <div class=\"ind-content\">\n        <div class=\"ind-num\">+90<\u002Fdiv>\n        <div class=\"ind-title\">Palestrantes<\u002Fdiv>\n        <div class=\"ind-desc\">Especialistas e líderes da indústria farmacêutica brasileira compartilhando conhecimento e cases reais<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Card 2 — Painéis -->\n    <div class=\"ind-card\">\n      <div class=\"ind-bg\" style=\"background:url('img_paineis.png') center/cover no-repeat, radial-gradient(120% 120% at 20% 20%, #0a2c4a 0%, #0a1428 62%)\"><\u002Fdiv>\n      <div class=\"ind-overlay\"><\u002Fdiv>\n      <div class=\"ind-content\">\n        <div class=\"ind-num blue\">6<\u002Fdiv>\n        <div class=\"ind-title\">Pilares de conteúdo<\u002Fdiv>\n        <div class=\"ind-desc\">Conteúdos criados a partir dos 6 pilares do 1°Censo da Indústria Farmacêutica, com tendências e oportunidades para o setor<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Card 3 — Salas -->\n    <div class=\"ind-card\">\n      <div class=\"ind-bg\" style=\"background:url('img_salas.png') center/cover no-repeat, radial-gradient(120% 120% at 20% 20%, #3a2808 0%, #0a1428 62%)\"><\u002Fdiv>\n      <div class=\"ind-overlay\"><\u002Fdiv>\n      <div class=\"ind-content\">\n        <div class=\"ind-num amber\">3<\u002Fdiv>\n        <div class=\"ind-title\">Salas temáticas<\u002Fdiv>\n        <div class=\"ind-desc\">Conteúdos personalizados para fornecedores — com capacidade para 105 pessoas cada, totalmente equipadas<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Card 4 — Horas de conteúdo -->\n    <div class=\"ind-card\">\n      <div class=\"ind-bg\" style=\"background:url('img_conteudo.png') center/cover no-repeat, radial-gradient(120% 120% at 20% 20%, #241845 0%, #0a1428 62%)\"><\u002Fdiv>\n      <div class=\"ind-overlay\"><\u002Fdiv>\n      <div class=\"ind-content\">\n        <div class=\"ind-num purple\">+120<\u002Fdiv>\n        <div class=\"ind-title\">Horas de conteúdo<\u002Fdiv>\n        <div class=\"ind-desc\">Talks rápidos, painéis estratégicos e pílulas de conteúdo com insights diretos do Censo da Indústria Farmacêutica<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Card 5 — Visitantes -->\n    <div class=\"ind-card\">\n      <div class=\"ind-bg\" style=\"background:url( #0b2b21 100%);border:1px solid rgba(0,229,192,0.4);border-radius:20px;padding:40px 44px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:24px;box-shadow:0 0 44px rgba(0,229,192,0.1);\">\n      <div style=\"max-width:560px;\">\n        <h3 style=\"font-size:26px;font-weight:700;color:#fff;letter-spacing:-0.02em;margin-bottom:8px;\">Coloque sua marca no centro da feira<\u002Fh3>\n        <p style=\"font-size:14.5px;color:#c0d8f0;line-height:1.65;\">Fale com a nossa equipe de patrocínios e garanta a presença da sua empresa no maior encontro da indústria farmacêutica.<\u002Fp>\n      <\u002Fdiv>\n      <button type=\"button\" onclick=\"openSponsor();return false;\" style=\"flex-shrink:0;padding:16px 30px;background:linear-gradient(100deg,#00e5c0,#00b4d8);color:#062018;border:none;border-radius:13px;font-size:15px;font-weight:700;letter-spacing:0.02em;cursor:pointer;font-family:'Manrope',sans-serif;box-shadow:0 10px 26px rgba(0,229,192,0.3);transition:filter 0.15s,box-shadow 0.18s;\" onmouseover=\"this.style.filter='brightness(1.05)';this.style.boxShadow='0 12px 32px rgba(0,229,192,0.42)';\" onmouseout=\"this.style.filter='';this.style.boxShadow='0 10px 26px rgba(0,229,192,0.3)';\">Quero ser patrocinador<\u002Fbutton>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ EQUIPE ══ -->\n<section id=\"equipe\" style=\"padding:104px 48px;background:#0a1428;border-top:1px solid #1e3a5f;\">\n  <div style=\"max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;\">\n\n    <div style=\"position:relative;border-radius:16px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.4);min-height:320px;background:linear-gradient(135deg,#0d2e1f,#0a1428);\">\n      <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#3a5a7a;font-family:'Space Grotesk',monospace;font-size:12px;letter-spacing:0.08em;text-align:center;padding:24px;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,0.02) 0 12px,transparent 12px 24px);\">\n        <div style=\"width:44px;height:44px;border-radius:12px;border:1.5px solid #1e3a5f;display:flex;align-items:center;justify-content:center;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"8\" r=\"4\" stroke=\"#3a5a7a\" stroke-width=\"1.6\"><\u002Fcircle><path d=\"M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7\" stroke=\"#3a5a7a\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        FOTO DA EQUIPE\n      <\u002Fdiv>\n      <img src=\"imagem_equipe.jpg\" alt=\"Equipe de curadoria Sindusfarma\" style=\"position:relative;width:100%;height:auto;display:block;\" onerror=\"this.style.display='none'\">\n      <div style=\"position:absolute;inset:0;z-index:2;pointer-events:none;background:linear-gradient(125deg,rgba(0,229,192,0.14) 0%,rgba(0,229,192,0) 42%,rgba(13,27,62,0.45) 100%);\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div style=\"font-size:13px;font-weight:700;letter-spacing:0.2em;color:#00e5c0;text-transform:uppercase;margin-bottom:14px;\">Nossa equipe<\u002Fdiv>\n      <h2 style=\"font-size:42px;font-weight:700;color:#fff;line-height:1.18;margin-bottom:24px;letter-spacing:-0.025em;\">Inteligência de Mercado &amp; Business Support<\u002Fh2>\n      <div style=\"width:40px;height:3px;background:#00e5c0;border-radius:2px;margin-bottom:28px;\"><\u002Fdiv>\n      <p style=\"font-size:15px;color:#c0d8f0;line-height:1.9;font-style:italic;border-left:3px solid #00e5c0;padding-left:20px;\">\n        \"A curadoria da Feira Sindusfarma Brasil foi realizada pela equipe de Inteligência de Mercado e Business Support do Sindusfarma, com dedicação, expertise e um olhar estratégico voltado para a inovação.\"\n      <\u002Fp>\n      <div style=\"margin-top:28px;display:flex;gap:12px;flex-wrap:wrap;\">\n        <span style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(0,229,192,0.1);border:1px solid rgba(0,229,192,0.3);color:#00e5c0;font-size:11px;font-weight:700;padding:5px 14px;border-radius:99px;\">📊 Inteligência de Mercado<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(77,166,255,0.1);border:1px solid rgba(77,166,255,0.3);color:#4da6ff;font-size:11px;font-weight:700;padding:5px 14px;border-radius:99px;\">🤝 Business Support<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.3);color:#a78bfa;font-size:11px;font-weight:700;padding:5px 14px;border-radius:99px;\">🏭 Sindusfarma<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer class=\"page-footer\">\n  <div class=\"footer-text\"><strong>Feira Sindusfarma Brasil 2027<\u002Fstrong><br>Espaço · 19 e 20 de maio de 2027 · São Paulo, SP<\u002Fdiv>\n  <div class=\"footer-text\" style=\"text-align:right;\">Realização: <strong>Sindusfarma<\u002Fstrong><br><span style=\"font-size:10px;opacity:0.55;letter-spacing:0.04em;\">Página feita por IA<\u002Fspan><\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n/* ESTANDES CINEMA SEATS */\n(function(){\n  var total = 75, vendidos = 0; // ← altere só aqui\n\n  var el = document.getElementById('estandes-vendidos');\n  if (el) el.textContent = vendidos;\n\n  var grid = document.getElementById('estandes-grid');\n  if (!grid) return;\n  var html = '<div style=\"display:flex;flex-wrap:wrap;gap:7px;\">';\n  for (var i = 0; i < total; i++) {\n    var sold = i < vendidos;\n    var title = sold ? 'Estande '+(i+1)+' — Vendido' : 'Estande '+(i+1)+' — Disponível';\n    html += '<div title=\"'+title+'\" style=\"width:30px;height:26px;border-radius:5px 5px 7px 7px;cursor:default;transition:transform 0.18s;background:'+(sold?'#00e5c0':'#15263f')+';border:1px solid '+(sold?'#00c4a8':'#2a5a8a')+';position:relative;'+(sold?'box-shadow:0 0 12px rgba(0,229,192,0.35);':'')+'\" onmouseover=\"this.style.transform=\\'scale(1.22)\\'\" onmouseout=\"this.style.transform=\\'scale(1)\\'\">'\n      + '<div style=\"position:absolute;bottom:0;left:0;right:0;height:4px;border-radius:0 0 4px 4px;background:'+(sold?'rgba(0,0,0,0.2)':'rgba(0,0,0,0.3)')+';\"><\u002Fdiv>'\n      + '<\u002Fdiv>';\n  }\n  html += '<\u002Fdiv>';\n  grid.innerHTML = html;\n})();\n\n/* COUNTDOWN TOGGLE */\nfunction toggleCountdown(){\n  var wrap=document.getElementById('inicio');\n  var btn=document.getElementById('cdToggle');\n  wrap.classList.toggle('collapsed');\n  btn.textContent=wrap.classList.contains('collapsed')?'▼ Expandir contagem':'▲ Recolher contagem';\n}\n\n/* AGENT TOGGLE */\nfunction toggleAgent(id) {\n  var el = document.getElementById(id);\n  var isOpen = el.style.display !== 'none';\n  ['a1','a2','a3','a4'].forEach(function(a){document.getElementById(a).style.display='none';});\n  if (!isOpen) el.style.display = 'block';\n}\n\n/* GANTT PHASE TOGGLE */\nfunction togglePhase(id) {\n  var d = document.getElementById(id);\n  if (!d) return;\n  var open = d.style.display !== 'none';\n  var chev = document.getElementById('chev-' + id);\n  d.style.display = open ? 'none' : 'block';\n  if (chev) chev.style.transform = open ? 'rotate(0deg)' : 'rotate(90deg)';\n}\n\n/* DATA LAKE → AGENTES — fluxo animado (a base distribui contexto para os agentes) */\n(function() {\n  var SVGNS = 'http://www.w3.org/2000/svg';\n  var svg = document.getElementById('flowSvg');\n  if (!svg) return;\n  var colors = ['#00e5c0','#4da6ff','#a78bfa','#fbbf24'];\n  var bases = [], dots = [], halos = [];\n  for (var i = 0; i < 4; i++) {\n    var b = document.createElementNS(SVGNS, 'path');\n    b.setAttribute('fill', 'none'); b.setAttribute('stroke', colors[i]);\n    b.setAttribute('stroke-width', '2.6'); b.setAttribute('stroke-linecap', 'round'); b.setAttribute('opacity', '0.42');\n    svg.appendChild(b); bases.push(b);\n  }\n  var srcHalo = document.createElementNS(SVGNS, 'circle');\n  srcHalo.setAttribute('r', '13'); srcHalo.setAttribute('fill', '#00e5c0'); srcHalo.setAttribute('opacity', '0.18');\n  var srcDot = document.createElementNS(SVGNS, 'circle');\n  srcDot.setAttribute('r', '6.5'); srcDot.setAttribute('fill', '#00e5c0');\n  svg.appendChild(srcHalo); svg.appendChild(srcDot);\n  for (i = 0; i < 4; i++) {\n    var h = document.createElementNS(SVGNS, 'circle');\n    h.setAttribute('r', '11'); h.setAttribute('fill', colors[i]); h.setAttribute('opacity', '0');\n    svg.appendChild(h); halos.push(h);\n    var dt = document.createElementNS(SVGNS, 'circle');\n    dt.setAttribute('r', '5'); dt.setAttribute('fill', colors[i]); dt.setAttribute('opacity', '0');\n    svg.appendChild(dt); dots.push(dt);\n  }\n  var srcX = 0, srcY = 5;\n  function draw() {\n    var sr = svg.getBoundingClientRect();\n    var W = sr.width, H = sr.height;\n    if (W < 2 || H < 2) return;\n    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);\n    srcX = W / 2;\n    srcHalo.setAttribute('cx', srcX); srcHalo.setAttribute('cy', srcY);\n    srcDot.setAttribute('cx', srcX); srcDot.setAttribute('cy', srcY);\n    var nodes = document.querySelectorAll('#agents-row .agent-pipe-node');\n    for (var i = 0; i < 4; i++) {\n      var n = nodes[i];\n      if (!n) { bases[i].removeAttribute('d'); continue; }\n      var r = n.getBoundingClientRect();\n      var tx = r.left + r.width / 2 - sr.left;\n      var ty = H - 1;\n      var midY = srcY + (ty - srcY) * 0.5;\n      bases[i].setAttribute('d', 'M' + srcX + ' ' + srcY + ' C ' + srcX + ' ' + midY + ', ' + tx + ' ' + midY + ', ' + tx + ' ' + ty);\n    }\n  }\n  var t0 = performance.now();\n  function tick(now) {\n    var t = (now - t0) / 1000;\n    srcHalo.setAttribute('opacity', (0.12 + 0.1 * (0.5 + 0.5 * Math.sin(t * 2))).toFixed(3));\n    for (var i = 0; i < 4; i++) {\n      var d = bases[i].getAttribute('d');\n      if (!d) { dots[i].setAttribute('opacity', '0'); halos[i].setAttribute('opacity', '0'); continue; }\n      var L = bases[i].getTotalLength();\n      if (!
