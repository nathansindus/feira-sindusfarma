o:'Pilar Força de Vendas',                                                                         tipo:'palestra', confirmado:true  },\n      { hora:'15:20', titulo:'A ser definido',                                                                                tipo:'palestra', confirmado:false },\n      { hora:'16:00', titulo:'A ser definido',                                                                                tipo:'mesa',     confirmado:false }\n    ],\n    dia2: [\n      { hora:'10:00', titulo:'Desafios reais do RH no presente: aprendizados sobre qualidade de vida no trabalho',             tipo:'mesa',     confirmado:true  },\n      { hora:'10:40', titulo:'Pilar Força de Vendas',                                                                         tipo:'mesa',     confirmado:true  },\n      { hora:'11:20', titulo:'Pilar Liderança',                                                                               tipo:'mesa',     confirmado:true  },\n      { hora:'12:00', titulo:'A ser definido',                                                                                tipo:'mesa',     confirmado:false },\n      { hora:'13:20', titulo:'Pesquisa Clínica',                                                                              tipo:'mesa',     confirmado:true  },\n      { hora:'14:00', titulo:'DP Inteligente, RH Eficiente: Tecnologia, Inteligência e Erro Zero',                            tipo:'mesa',     confirmado:true  },\n      { hora:'14:40', titulo:'Pilar Financeiro',                                                                              tipo:'mesa',     confirmado:true  },\n      { hora:'15:20', titulo:'Pilar Liderança',                                                                               tipo:'mesa',     confirmado:true  },\n      { hora:'16:00', titulo:'Pilar Força de Vendas',                                                                         tipo:'mesa',     confirmado:true  }\n    ]\n  }\n};\n\nvar tipoColors = {\n  palestra:  { bg:'rgba(77,166,255,0.12)',  border:'#4da6ff',  label:'Palestra',        text:'#4da6ff'  },\n  mesa:      { bg:'rgba(167,139,250,0.12)', border:'#a78bfa',  label:'Mesa redonda',    text:'#a78bfa'  },\n  negocios:  { bg:'rgba(251,191,36,0.12)',  border:'#fbbf24',  label:'Roda de negócios',text:'#fbbf24'  }\n};\n\nvar salaColors = { plenaria:'#4da6ff', sala1:'#a78bfa', sala2:'#00e5c0' };\n\n// Slots de \"Pilar ...\" e \"A ser definido\" contam como A DEFINIR (não são palestras confirmadas)\nfunction isUndefSlot(p) {\n  return p.titulo === 'A ser definido' || /^pilar\\b/i.test(p.titulo.trim());\n}\nfunction gradeProgress() {\n  var conf = 0, META = 56;\n  ['plenaria','sala1','sala2'].forEach(function(s){\n    ['dia1','dia2'].forEach(function(dk){\n      (grade[s][dk] || []).forEach(function(p){ if(!isUndefSlot(p)) conf++; });\n    });\n  });\n  return { conf: conf, meta: META, pct: Math.round(conf/META*1000)/10 };\n}\nfunction updateProgressUI() {\n  var gp = gradeProgress();\n  var n = document.getElementById('prog-num'); if(n) n.textContent = gp.conf;\n  var d = document.getElementById('prog-den'); if(d) d.textContent = '/ ' + gp.meta;\n  var p = document.getElementById('prog-pct'); if(p) p.textContent = String(gp.pct).replace('.',',') + '% concluído';\n}\nfunction buildProgSummary() {\n  var el = document.getElementById('prog-summary');\n  if (!el) return;\n  var counts = { palestra:0, mesa:0, negocios:0 };\n  ['plenaria','sala1','sala2'].forEach(function(s){\n    ['dia1','dia2'].forEach(function(dk){\n      (grade[s][dk] || []).forEach(function(p){\n        if (!isUndefSlot(p) && counts.hasOwnProperty(p.tipo)) counts[p.tipo]++;\n      });\n    });\n  });\n  var items = [\n    { n: counts.palestra + counts.mesa + counts.negocios, lbl: 'palestras confirmadas', c:'#00e5c0' },\n    { n: counts.palestra, lbl: 'palestras', c:'#4da6ff' },\n    { n: counts.mesa, lbl: 'mesas redondas', c:'#a78bfa' },\n    { n: counts.negocios, lbl: 'rodas de negócio', c:'#fbbf24' }\n  ];\n  el.innerHTML = items.map(function(it){\n    return '<div style=\"display:flex;align-items:center;gap:10px;padding:12px 18px;background:#0a1428;border:1px solid #1e3a5f;border-radius:12px;\">'\n      + '<div style=\"font-family:\\'Space Grotesk\\',sans-serif;font-size:26px;font-weight:700;color:'+it.c+';line-height:1;font-variant-numeric:tabular-nums;\">'+it.n+'<\u002Fdiv>'\n      + '<div style=\"font-size:12px;color:#9fc0db;line-height:1.25;max-width:90px;\">'+it.lbl+'<\u002Fdiv>'\n      + '<\u002Fdiv>';\n  }).join('');\n}\n\nfunction selectDia(d) {\n  progState.dia = d;\n  document.getElementById('btn-dia1').style.background = d===1 ? '#00e5c0' : 'transparent';\n  document.getElementById('btn-dia1').style.color      = d===1 ? '#0d1b3e' : '#7eb8d4';\n  document.getElementById('btn-dia1').style.borderColor= d===1 ? '#00e5c0' : '#1e3a5f';\n  document.getElementById('btn-dia2').style.background = d===2 ? '#00e5c0' : 'transparent';\n  document.getElementById('btn-dia2').style.color      = d===2 ? '#0d1b3e' : '#7eb8d4';\n  document.getElementById('btn-dia2').style.borderColor= d===2 ? '#00e5c0' : '#1e3a5f';\n  renderGrade();\n}\n\nfunction selectSala(s) {\n  progState.sala = s;\n  var salas = ['plenaria','sala1','sala2'];\n  salas.forEach(function(id) {\n    var btn = document.getElementById('btn-'+id);\n    var active = id === s;\n    btn.style.background   = active ? salaColors[id] : '#0a1428';\n    btn.style.color        = active ? '#0d1b3e' : '#7eb8d4';\n    btn.style.borderColor  = active ? salaColors[id] : '#1e3a5f';\n    btn.style.border       = active ? 'none' : '2px solid #1e3a5f';\n  });\n\n  // Plenária não esconde mais os filtros de tipo\n  document.getElementById('btn-mesa').style.display     = 'inline-block';\n  document.getElementById('btn-negocios').style.display = 'inline-block';\n\n  renderGrade();\n}\n\nfunction selectTipo(t) {\n  progState.tipo = t;\n  var tipos = ['todos','palestra','mesa','negocios'];\n  tipos.forEach(function(id) {\n    var btn = document.getElementById('btn-'+id);\n    var active = id === t;\n    btn.style.background = active ? '#00e5c0' : 'transparent';\n    btn.style.color      = active ? '#0d1b3e' : '#7eb8d4';\n    btn.style.border     = active ? 'none' : '1px solid #1e3a5f';\n  });\n  renderGrade();\n}\n\nfunction renderGrade() {\n  var container = document.getElementById('grade-container');\n  var salaData  = grade[progState.sala];\n  var palestras = salaData['dia'+progState.dia] || [];\n  var diaLabel  = progState.dia === 1 ? 'Dia 1 — 19 Mai' : 'Dia 2 — 20 Mai';\n  var salaLabel = { plenaria:'Plenária', sala1:'Sala 1', sala2:'Sala 2' }[progState.sala];\n  var cor       = salaColors[progState.sala];\n\n  var html = '<div style=\"padding:12px 16px;border-bottom:1px solid #1e3a5f;display:flex;align-items:center;justify-content:space-between;\">'\n    + '<div style=\"font-size:12px;font-weight:700;color:'+cor+';\">'+salaLabel+' · '+diaLabel+'<\u002Fdiv>'\n    + '<div style=\"font-size:11px;color:#7eb8d4;\">'+salaData.duration+'min palestra + '+salaData.intervalo+'min troca · '+salaData.slots+' slots<\u002Fdiv>'\n    + '<\u002Fdiv>';\n\n  var filtrados = palestras.filter(function(p) {\n    return progState.tipo === 'todos' || p.tipo === progState.tipo;\n  });\n\n  if (filtrados.length === 0) {\n    html += '<div style=\"padding:32px;text-align:center;color:#3a5a7a;font-size:13px;\">Nenhuma palestra deste tipo nesta sala.<\u002Fdiv>';\n  }\n\n  filtrados.forEach(function(p) {\n    var tc = tipoColors[p.tipo] || tipoColors.palestra;\n    var isEmpty = isUndefSlot(p);\n    html += '<div style=\"display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,0.04);padding:14px 18px;gap:16px;transition:background 0.2s,transform 0.2s;border-left:3px solid '+(isEmpty?'#15263f':tc.border)+';\" onmouseover=\"this.style.background=\\'rgba(255,255,255,0.03)\\';this.style.transform=\\'translateX(4px)\\'\" onmouseout=\"this.style.background=\\'transparent\\';this.style.transform=\\'translateX(0)\\'\">'\n      + '<div style=\"width:58px;flex-shrink:0;text-align:center;background:'+cor+'1a;border-radius:9px;padding:8px 0;\">'\n      +   '<div class=\"font-display\" style=\"font-size:14px;font-weight:700;color:'+cor+';font-variant-numeric:tabular-nums;letter-spacing:-0.01em;\">'+p.hora+'<\u002Fdiv>'\n      + '<\u002Fdiv>'\n      + '<div style=\"flex:1;\">'\n      +   '<div style=\"font-size:14px;font-weight:'+(isEmpty?'400':'600')+';color:'+(isEmpty?'#3a5a7a':'#fff')+';font-style:'+(isEmpty?'italic':'normal')+';margin-bottom:6px;line-height:1.4;\">'+p.titulo+'<\u002Fdiv>'\n      +   '<div style=\"display:flex;gap:6px;align-items:center;\">'\n      +     '<span style=\"font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;background:'+tc.bg+';color:'+tc.text+';border:1px solid '+tc.border+';\">'+tc.label+'<\u002Fspan>'\n      +     (p.palestrante ? '<span style=\"font-size:10px;color:#7eb8d4;\">'+p.palestrante+'<\u002Fspan>' : '')\n      +   '<\u002Fdiv>'\n      + '<\u002Fdiv>'\n    + '<\u002Fdiv>';\n  });\n\n  if (!html.includes('display:flex;align-items:center;border-bottom')) {\n    html += '<div style=\"padding:32px;text-align:center;color:#3a5a7a;font-size:13px;\">Nenhuma palestra deste tipo nesta sala ainda.<\u002Fdiv>';\n  }\n\n  container.style.transition = 'opacity 0.28s ease';\n  container.style.opacity = '0';\n  container.innerHTML = html;\n  requestAnimationFrame(function(){ container.style.opacity = '1'; });\n}\n\n// Init\nrenderGrade();\nupdateProgressUI();\n\n\nfunction drawConnectors(){\n  var grid=document.getElementById('ctxGrid'),svg=document.getElementById('connSvg'),center=document.getElementById('dlCenter');\n  if(!grid||!svg||!center) return;\n  var ids=['ac','ef','fi','sp'],colors=['#00e5c0','#4da6ff','#a78bfa','#fbbf24'];\n  var gr=grid.getBoundingClientRect();\n  function mid(el){var r=el.getBoundingClientRect();return{x:r.left-gr.left+r.width/2,y:r.top-gr.top+r.height/2};}\n  function edge(from,to){\n    var f=from.getBoundingClientRect(),fl=f.left-gr.left,ft=f.top-gr.top,fw=f.width,fh=f.height,tm=mid(to);\n    var cx=fl+fw/2,cy=ft+fh/2,dx=tm.x-cx,dy=tm.y-cy,angle=Math.atan2(dy,dx);\n    var hw=fw/2+2,hh=fh/2+2,ex,ey;\n    if(Math.abs(dx/hw)>Math.abs(dy/hh)){ex=cx+(dx>0?hw:-hw);ey=cy+Math.tan(angle)*(dx>0?hw:-hw);}\n    else{ey=cy+(dy>0?hh:-hh);ex=cx+(dy>0?hh:-hh)/Math.tan(angle);}\n    return{x:ex,y:ey};\n  }\n  var cMid=mid(center);\n  var html='<defs>'+ids.map(function(id,i){return'<marker id=\"arr'+i+'\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto\"><path d=\"M2 2L8 5L2 8\" fill=\"none\" stroke=\"'+colors[i]+'\" stroke-width=\"1.5\" stroke-linecap=\"round\"/><\u002Fmarker>';}).join('')+'<\u002Fdefs>';\n  ids.forEach(function(id,i){\n    var el=document.getElementById(id),start=edge(el,center),end=edge(center,el);\n    var cx1=start.x+(cMid.x-start.x)*0.45,cy1=start.y+(cMid.y-start.y)*0.45;\n    html+='<path d=\"M'+start.x+','+start.y+' C'+cx1+','+cy1+' '+cx1+','+cy1+' '+end.x+','+end.y+'\" stroke=\"'+colors[i]+'\" stroke-width=\"1.4\" stroke-dasharray=\"5 4\" fill=\"none\" marker-end=\"url(#arr'+i+')\" opacity=\"0.7\"/>';\n  });\n  svg.innerHTML=html;\n}\nwindow.addEventListener('load',drawConnectors);\nwindow.addEventListener('resize',drawConnectors);\n\n/* SCROLL-SPY NAV */\n(function(){\n  var ids=['sobre','curadoria','programacao','patrocinios','equipe'];\n  var links={};\n  document.querySelectorAll('.nav-links a').forEach(function(a){\n    var href=a.getAttribute('href');\n    if(href&&href.charAt(0)==='#') links[href.slice(1)]=a;\n  });\n  var spy=new IntersectionObserver(function(entries){\n    entries.forEach(function(e){\n      if(e.isIntersecting){\n        Object.keys(links).forEach(function(k){links[k].classList.remove('active');});\n        if(links[e.target.id]) links[e.target.id].classList.add('active');\n      }\n    });\n  },{rootMargin:'-45% 0px -50% 0px',threshold:0});\n  ids.forEach(function(id){var s=document.getElementById(id);if(s)spy.observe(s);});\n})();\n<\u002Fscript>\n<!-- ══ OVERLAY: SEJA PATROCINADOR ══ -->\n<div id=\"sponsorOverlay\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Seja Patrocinador\">\n  <div class=\"stage\">\n    <div class=\"orb a\"><\u002Fdiv>\n    <div class=\"orb b\"><\u002Fdiv>\n    <div class=\"grid-overlay\"><\u002Fdiv>\n\n    <div class=\"topbar\">\n      <button type=\"button\" class=\"back\" onclick=\"closeSponsor()\">← Voltar ao portal<\u002Fbutton>\n      <img src=\"27670760-e331-4d24-8997-6856b313b9de\" height=\"26\" alt=\"Sindusfarma Brasil\" style=\"display:block;\">\n    <\u002Fdiv>\n\n    <div class=\"wrap\">\n      <div class=\"copy\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>Sindusfarma Brasil · 19 e 20 de maio<\u002Fdiv>\n        <h1>Esteja onde a <span class=\"accent\">farma faz negócio<\u002Fspan><\u002Fh1>\n        <p class=\"lead\">A indústria farmacêutica reunida em <strong>dois dias de conteúdo estratégico, negócios e conexões<\u002Fstrong>. Coloque a sua marca no centro do maior encontro do setor.<\u002Fp>\n        <div class=\"meta\">\n          <div class=\"item\"><span class=\"k\">Data<\u002Fspan><span class=\"v\">19 e 20 de maio<\u002Fspan><\u002Fdiv>\n          <div class=\"divider\"><\u002Fdiv>\n          <div class=\"item\"><span class=\"k\">ESPAÇO<\u002Fspan><span class=\"v\">Espaço<\u002Fspan><\u002Fdiv>\n          <div class=\"item\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"success\" id=\"sp_successBox\">\n          <div class=\"check\">\n            <svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 13l4 4L19 7\" stroke=\"#00c6a7\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h2 style=\"color:#0d1b3e;\">Recebemos seu interesse!<\u002Fh2>\n          <p>Abrimos seu email já preenchido para envio à equipe de patrocínios. Se não abriu automaticamente, fale com a gente pelo email abaixo.<\u002Fp>\n          <p style=\"margin-top:10px;\"><a href=\"mailto:nathan@sindusfarma.org.br\">nathan@sindusfarma.org.br<\u002Fa><\u002Fp>\n          <button class=\"again\" id=\"sp_againBtn\">Enviar outro cadastro<\u002Fbutton>\n        <\u002Fdiv>\n        <form id=\"sp_sponsorForm\" novalidate=\"\">\n          <h2>Quero ser patrocinador<\u002Fh2>\n          <p class=\"sub\">Preencha seus dados e a nossa equipe de patrocínios entrará em contato.<\u002Fp>\n\n          <div class=\"field\">\n            <label for=\"sp_nome\">Nome completo <span class=\"req\">*<\u002Fspan><\u002Flabel>\n            <input class=\"input\" type=\"text\" id=\"sp_nome\" name=\"nome\" placeholder=\"Seu nome completo\" autocomplete=\"name\">\n            <div class=\"err-msg\" data-for=\"sp_nome\">Informe seu nome.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"field\">\n            <label for=\"sp_email\">Email corporativo <span class=\"req\">*<\u002Fspan><\u002Flabel>\n            <input class=\"input\" type=\"email\" id=\"sp_email\" name=\"email\" placeholder=\"nome@suaempresa.com.br\" autocomplete=\"email\">\n            <div class=\"err-msg\" data-for=\"sp_email\">Informe um email válido.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"field\">\n            <label for=\"sp_whatsapp\">WhatsApp <span class=\"req\">*<\u002Fspan><\u002Flabel>\n            <div class=\"phone\" id=\"sp_phoneWrap\">\n              <span class=\"flag\">🇧🇷 +55<\u002Fspan>\n              <input type=\"tel\" id=\"sp_whatsapp\" name=\"whatsapp\" placeholder=\"(11) 99999-9999\" autocomplete=\"tel\">\n            <\u002Fdiv>\n            <div class=\"err-msg\" data-for=\"sp_whatsapp\">Informe seu WhatsApp.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"field\">\n            <label for=\"sp_empresa\">Empresa <span class=\"req\">*<\u002Fspan><\u002Flabel>\n            <input class=\"input\" type=\"text\" id=\"sp_empresa\" name=\"empresa\" placeholder=\"Nome da sua empresa\" autocomplete=\"organization\">\n            <div class=\"err-msg\" data-for=\"sp_empresa\">Informe o nome da empresa.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <button type=\"submit\" class=\"submit\">Quero ser patrocinador<\u002Fbutton>\n          <p class=\"fineprint\">Ao enviar, seus dados serão encaminhados à equipe de patrocínios da Sindusfarma Brasil.<\u002Fp>\n        <\u002Fform>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══ DASHBOARD OVERLAY ══ -->\n<div id=\"dashOverlay\" style=\"position:fixed;inset:0;z-index:9000;background:#081020;display:none;flex-direction:column;\">\n  <div style=\"flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 20px;background:#0a1730;border-bottom:1px solid #1e3555;\">\n    <div style=\"display:flex;align-items:center;gap:11px;\">\n      <div style=\"width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#00e5c0,#00b4d8);display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#062018\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 3v18h18\"><\u002Fpath><path d=\"M18 17V9\"><\u002Fpath><path d=\"M13 17V5\"><\u002Fpath><path d=\"M8 17v-3\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"font-family:'Space Grotesk','Manrope',sans-serif;font-size:14px;font-weight:700;color:#e9f1fb;letter-spacing:-0.01em;\">Inteligência do Censo <span style=\"color:#5f7a9c;font-weight:500;\">· Dashboard de conteúdo<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <button type=\"button\" onclick=\"closeDashboard();return false;\" style=\"display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border:1px solid #274168;border-radius:9px;background:transparent;color:#8aa4c6;font-family:'Manrope',sans-serif;font-size:12.5px;font-weight:700;cursor:pointer;\" onmouseover=\"this.style.borderColor='#00e5c0';this.style.color='#00e5c0';\" onmouseout=\"this.style.borderColor='#274168';this.style.color='#8aa4c6';\">\n      <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg>\n      Fechar\n    <\u002Fbutton>\n  <\u002Fdiv>\n  <iframe id=\"dashFrame\" title=\"Inteligência do Censo\" src=\"about:blank#f41eb899-fb82-4173-90e2-f82948155f61\" style=\"flex:1;width:100%;border:none;background:#081020;\" allow=\"clipboard-write\"><\u002Fiframe>\n<\u002Fdiv>\n\n<script>\nfunction openDashboard(){\n  var ov = document.getElementById('dashOverlay');\n  var fr = document.getElementById('dashFrame');\n  if(!fr.getAttribute('src')) fr.setAttribute('src','../Intelig%C3%AAncia%20do%20Censo.dc.html');\n  ov.style.display = 'flex';\n  document.body.style.overflow = 'hidden';\n}\nfunction closeDashboard(){\n  document.getElementById('dashOverlay').style.display = 'none';\n  document.body.style.overflow = '';\n}\ndocument.addEventListener('keydown', function(e){ if(e.key==='Escape' && document.getElementById('dashOverlay').style.display==='flex') closeDashboard(); });\n<\u002Fscript>\n\n<script>\nfunction openSponsor(){\n  var ov = document.getElementById('sponsorOverlay');\n  ov.classList.add('open');\n  document.body.classList.add('sp-lock');\n  ov.scrollTop = 0;\n}\nfunction closeSponsor(){\n  document.getElementById('sponsorOverlay').classList.remove('open');\n  document.body.classList.remove('sp-lock');\n}\n(function(){\n  var TEAM_EMAIL = 'nathan@sindusfarma.org.br';\n  var form = document.getElementById('sp_sponsorForm');\n  var successBox = document.getElementById('sp_successBox');\n  var map = {nome:'sp_nome', email:'sp_email', whatsapp:'sp_whatsapp', empresa:'sp_empresa'};\n  var fields = ['nome','email','whatsapp','empresa'];\n\n  function showErr(key, on){\n    var id = map[key];\n    var input = document.getElementById(id);\n    var wrap = (key === 'whatsapp') ? document.getElementById('sp_phoneWrap') : input;\n    var msg = document.querySelector('#sponsorOverlay .err-msg[data-for=\"'+id+'\"]');\n    wrap.classList.toggle('invalid', on);\n    if (msg) msg.classList.toggle('show', on);\n  }\n\n  fields.forEach(function(key){\n    document.getElementById(map[key]).addEventListener('input', function(){ showErr(key, false); });\n  });\n\n  function validEmail(v){ return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(v); }\n\n  form.addEventListener('submit', function(e){\n    e.preventDefault();\n    var vals = {}, ok = true;\n    fields.forEach(function(key){ vals[key] = document.getElementById(map[key]).value.trim(); });\n\n    if (!vals.nome){ showErr('nome', true); ok = false; }\n    if (!validEmail(vals.email)){ showErr('email', true); ok = false; }\n    if (vals.whatsapp.replace(/\\D/g,'').length < 10){ showErr('whatsapp', true); ok = false; }\n    if (!vals.empresa){ showErr('empresa', true); ok = false; }\n    if (!ok) return;\n\n    var subject = 'Novo interesse em patrocínio — ' + vals.empresa;\n    var body =\n      'Novo cadastro de interesse em patrocínio — Sindusfarma Brasil 2027\\n\\n' +\n      'Nome completo: ' + vals.nome + '\\n' +\n      'Email corporativo: ' + vals.email + '\\n' +\n      'WhatsApp: +55 ' + vals.whatsapp + '\\n' +\n      'Empresa: ' + vals.empresa + '\\n';\n    var mailto = 'mailto:' + TEAM_EMAIL +\n      '?subject=' + encodeURIComponent(subject) +\n      '&body=' + encodeURIComponent(body);\n\n    window.location.href = mailto;\n    form.style.display = 'none';\n    successBox.classList.add('show');\n  });\n\n  document.getElementById('sp_againBtn').addEventListener('click', function(){\n    form.reset();\n    fields.forEach(function(key){ showErr(key, false); });\n    successBox.classList.remove('show');\n    form.style.display = 'block';\n  });\n\n  document.addEventListener('keydown', function(e){\n    if (e.key === 'Escape') closeSponsor();\n  });\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
